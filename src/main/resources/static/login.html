<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Arjun Vardhan Russo Akkena</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
    <nav class="login-nav">
        <h1 class="login-logo">Arjun Vardhan Russo Akkena</h1>
    </nav>
    <main class="login-main">
        <div class="login-card">
            <h2>Sign in to view portfolio</h2>
            <p>Access the professional profile and engineering deployments.</p>
            <form action="index.html" method="GET">
                <input type="text" placeholder="Recruiter / Guest Email" required>
                <input type="password" placeholder="Password (Any)" required>
                <button type="submit" class="btn primary full-width">Sign in</button>
            </form>
            <div class="login-divider"><span>or</span></div>
            <a href="index.html" class="btn secondary full-width">Continue as Guest</a>
        </div>
    </main>
</body>
</html>
